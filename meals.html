    .tab.active { color:var(--accent);border-bottom-color:var(--accent); }
    main { flex:1;overflow-y:auto;padding:16px;max-width:640px;width:100%;margin:0 auto; }
    .page { display:none; } .page.active { display:block; }

    .week-nav { display:flex;align-items:center;justify-content:space-between;margin-bottom:16px; }
    .week-label { font-size:.88rem;color:var(--muted); }
    .week-btn { background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:.85rem; }

    .day-row { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden; }
    .day-header { padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border); }
    .day-name { font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;width:36px; }
    .day-date { font-size:.78rem;color:var(--muted); }
    .today-chip { font-size:.65rem;background:var(--accent);color:#fff;border-radius:8px;padding:2px 7px;font-weight:700; }

    .slot-label { font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px; }

    .meal-slot:hover { background:#2a2a2a; }
    .meal-slot .slot-emoji { font-size:1.3rem; }
    .meal-slot .slot-name { flex:1;font-size:.88rem; }
    .meal-slot .slot-name.empty-slot { color:var(--muted);font-style:italic; }
    .meal-slot .slot-remove { color:var(--muted);font-size:.85rem;padding:2px 6px;border-radius:5px; }
    .meal-slot .slot-remove:hover { color:var(--red);background:rgba(247,90,90,.1); }

    .meal-grid { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
    .meal-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 14px;cursor:pointer;transition:all .15s;position:relative; }
    .meal-card:active { transform:scale(.97); }
    .meal-card:hover { border-color:#3a3a3a; }
    .meal-card .meal-emoji { font-size:2rem;margin-bottom:8px;display:block; }
    .meal-card .meal-name { font-size:.85rem;font-weight:600;margin-bottom:2px; }
    .meal-card .meal-ing-count { font-size:.7rem;color:var(--muted); }
    .meal-card .del-meal { position:absolute;top:8px;right:8px;color:var(--muted);font-size:.8rem;padding:3px 7px;border-radius:6px;cursor:pointer; }
    .meal-card .del-meal:hover { color:var(--red);background:rgba(247,90,90,.1); }

    .ing-list { margin-top:8px; }
    .ing-row { display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:.88rem; }

    .ing-cat { font-size:.7rem;color:var(--accent); }

    .modal { background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:24px 20px 32px;width:100%;max-width:640px;transform:translateY(40px);transition:transform .25s;max-height:90vh;overflow-y:auto; }
    .modal-overlay.open .modal { transform:translateY(0); }

    .toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:30px;font-size:.85rem;font-weight:500;z-index:300;transition:transform .3s;white-space:nowrap; }

];

async function seedMeals(){
  const snap=await getDocs(collection(db,'families',FC,'mealLibrary'));
  const existingNames=new Set(snap.docs.map(d=>(d.data().name||'').toLowerCase()));
  const toAdd=DEFAULT_MEALS.filter(m=>!existingNames.has(m.name.toLowerCase()));
  for(const m of toAdd) await addDoc(collection(db,'families',FC,'mealLibrary'),{...m,createdAt:serverTimestamp()});
}
seedMeals();

onSnapshot(query(collection(db,'families',FC,'mealLibrary'),orderBy('createdAt')),snap=>{
  meals=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderAll();
});

onSnapshot(collection(db,'families',FC,'mealPlan'),snap=>{
  mealPlan={};
  snap.docs.forEach(d=>{ mealPlan[d.id]={id:d.id,...d.data()}; });
  renderAll();
});

window.switchTab=function(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  renderAll();
};

function renderAll(){
  if(currentTab==='plan') renderPlan();
  if(currentTab==='library') renderLibrary();
  if(currentTab==='ingredients') renderIngredients();
}

function getWeekDays(){
  const base=new Date(); base.setDate(base.getDate()+weekOffset*7);
  const sun=new Date(base); sun.setDate(sun.getDate()-sun.getDay());
  return Array.from({length:7},(_,i)=>{ const d=new Date(sun); d.setDate(sun.getDate()+i); return d; });
}

window.changeWeek=function(dir){ weekOffset+=dir; renderPlan(); };

function renderPlan(){
  const days=getWeekDays();
  const today=todayStr();
  document.getElementById('week-label').textContent=MONTHS[days[0].getMonth()]+' '+days[0].getDate()+' — '+MONTHS[days[6].getMonth()]+' '+days[6].getDate();
  const el=document.getElementById('plan-content'); el.innerHTML='';

  days.forEach(day=>{
    const dateStr=dateToStr(day);
    const isToday=dateStr===today;
    const dayEl=document.createElement('div'); dayEl.className='day-row';
    dayEl.innerHTML=`<div class="day-header">
      <span class="day-name">${DAYS[day.getDay()].slice(0,3)}</span>
      <span class="day-date">${MONTHS[day.getMonth()]} ${day.getDate()}</span>
      ${isToday?'<span class="today-chip">Today</span>':''}
    </div>`;

    const slots=document.createElement('div'); slots.className='meal-slots';
    SLOTS.forEach(slot=>{
      const key=dateStr+'_'+slot;
      const planned=mealPlan[key];
      const meal=planned ? meals.find(m=>m.id===planned.mealId) : null;
      const slotEl=document.createElement('div');
      slotEl.innerHTML=`<div class="slot-label">${slot}</div>`;
      const row=document.createElement('div'); row.className='meal-slot';
      if(meal){
        row.innerHTML=`<span class="slot-emoji">${meal.emoji||'🍽️'}</span><span class="slot-name">${esc(meal.name)}</span><span class="slot-remove" onclick="removeMeal('${key}')">✕</span>`;
      } else {
        row.innerHTML=`<span class="slot-emoji" style="opacity:.3">🍽️</span><span class="slot-name empty-slot">Tap to plan…</span>`;
        row.onclick=()=>openPickModal(key);
      }
      slotEl.appendChild(row);
      slots.appendChild(slotEl);
    });
    dayEl.appendChild(slots);
    el.appendChild(dayEl);
  });
}

function renderLibrary(){
  const el=document.getElementById('library-content');
  if(meals.length===0){ el.innerHTML='<div class="empty">No meals yet.</div>'; return; }
  el.innerHTML='';
  const grid=document.createElement('div'); grid.className='meal-grid';
  meals.forEach(meal=>{
    const card=document.createElement('div'); card.className='meal-card';
    card.innerHTML=`
      <span class="meal-emoji">${meal.emoji||'🍽️'}</span>
      <div class="meal-name">${esc(meal.name)}</div>
      <div class="meal-ing-count">${(meal.ingredients||[]).length} ingredients</div>
      <span class="del-meal" onclick="deleteMeal(event,'${meal.id}')">✕</span>`;
    card.onclick=()=>showMealDetail(meal);
    grid.appendChild(card);
  });
  el.appendChild(grid);
}

function showMealDetail(meal){
  const el=document.getElementById('library-content');
  el.innerHTML=`
    <button class="btn btn-ghost btn-sm" onclick="renderLibrary()" style="margin-bottom:12px">← Back</button>
    <div class="card">
      <div style="font-size:2.5rem;margin-bottom:8px">${meal.emoji||'🍽️'}</div>
      <div style="font-size:1.1rem;font-weight:700;margin-bottom:4px">${esc(meal.name)}</div>
      <div class="section-head" style="margin-top:12px">Ingredients</div>
      <div class="ing-list">
        ${(meal.ingredients||[]).map(i=>`<div class="ing-row"><span class="ing-qty">${esc(i.qty||'')}</span><span class="ing-name">${esc(i.name)}</span><span class="ing-cat">${i.cat||''}</span></div>`).join('')}
      </div>
    </div>
    <button class="btn btn-success btn-full" onclick="addMealToGroceries('${meal.id}')">+ Add ingredients to grocery list</button>`;
}
window.renderLibrary=renderLibrary;

function renderIngredients(){
  const el=document.getElementById('ing-content');
  const days=getWeekDays();
  const allIng={};
  days.forEach(day=>{
    const dateStr=dateToStr(day);
    SLOTS.forEach(slot=>{
      const key=dateStr+'_'+slot;
      const planned=mealPlan[key];
      if(!planned) return;
      const meal=meals.find(m=>m.id===planned.mealId);
      if(!meal) return;
      (meal.ingredients||[]).forEach(ing=>{
        const k=ing.name.toLowerCase();
        if(!allIng[k]) allIng[k]={...ing,count:0};
        allIng[k].count++;
      });
    });
  });
  const ingList=Object.values(allIng);
  if(ingList.length===0){ el.innerHTML='<div class="empty">No meals planned this week.<br>Go to <strong>This Week</strong> to assign meals.</div>'; return; }
  el.innerHTML='';
  const btn=document.createElement('button'); btn.className='btn btn-success btn-full';
  btn.style.marginBottom='16px';
  btn.textContent='+ Add all to grocery list';
  btn.onclick=()=>addAllToGroceries(ingList);
  el.appendChild(btn);
  const card=document.createElement('div'); card.className='card';
  ingList.forEach(ing=>{
    const row=document.createElement('div'); row.className='ing-row';
    row.innerHTML=`<span class="ing-qty">${esc(ing.qty||'')}</span><span class="ing-name">${esc(ing.name)}</span><span class="ing-cat">${esc(ing.cat||'')}</span>`;
    card.appendChild(row);
  });
  el.appendChild(card);
}

async function addAllToGroceries(ings){
  const snap=await getDocs(collection(db,'families',FC,'shoppingList'));
  const existing=snap.docs.map(d=>d.data().name.toLowerCase());
  let added=0;
  for(const ing of ings){
    if(!existing.includes(ing.name.toLowerCase())){
      await addDoc(collection(db,'families',FC,'shoppingList'),{name:ing.name,category:ing.cat||'pantry',qty:1,checked:false,addedAt:serverTimestamp(),source:'meal',location:ing.cat||'pantry'});
      added++;
    }
  }
  showToast(added>0?added+' ingredients added to grocery list!':'Already all on your list!');
}

window.addMealToGroceries=async function(mealId){
  const meal=meals.find(m=>m.id===mealId); if(!meal) return;
  await addAllToGroceries(meal.ingredients||[]);
};

// PICK MODAL
window.openPickModal=function(key){
  pickTarget=key;
  const el=document.getElementById('pick-list'); el.innerHTML='';
  meals.forEach(meal=>{
    const div=document.createElement('div'); div.className='pick-modal-item';
    div.innerHTML=`<span class="pick-emoji">${meal.emoji||'🍽️'}</span><span class="pick-name">${esc(meal.name)}</span><span class="pick-meta">${(meal.ingredients||[]).length} ing.</span>`;
    div.onclick=()=>assignMeal(meal);
    el.appendChild(div);
  });
  document.getElementById('pick-modal').classList.add('open');
};
window.closePickModal=()=>document.getElementById('pick-modal').classList.remove('open');

async function assignMeal(meal){
  if(!pickTarget) return;
  await setDoc(doc(db,'families',FC,'mealPlan',pickTarget),{mealId:meal.id,mealName:meal.name,updatedAt:serverTimestamp()});
  closePickModal(); showToast(meal.name+' planned!');
}

window.removeMeal=async function(key){ await deleteDoc(doc(db,'families',FC,'mealPlan',key)); showToast('Removed'); };

// DELETE MEAL
window.deleteMeal=async function(e,id){
  e.stopPropagation();
  if(!confirm('Delete this meal from your library?')) return;
  await deleteDoc(doc(db,'families',FC,'mealLibrary',id)); showToast('Meal deleted');
};

// ADD MEAL MODAL
let ingRows=[];
window.openAddMealModal=function(){
  ingRows=[{name:'',qty:'',cat:'pantry'}];
  document.getElementById('new-meal-name').value='';
  document.getElementById('new-meal-emoji').value='🍽️';
  renderIngRows();
  document.getElementById('add-meal-modal').classList.add('open');
};
window.closeAddMealModal=()=>document.getElementById('add-meal-modal').classList.remove('open');

window.addIngRow=function(){ ingRows.push({name:'',qty:'',cat:'pantry'}); renderIngRows(); };

function renderIngRows(){
  const el=document.getElementById('ing-rows'); el.innerHTML='';
  ingRows.forEach((ing,i)=>{
    const row=document.createElement('div'); row.style.cssText='display:flex;gap:6px;margin-bottom:8px;align-items:center';
    row.innerHTML=`
      <input type="text" placeholder="Ingredient" value="${esc(ing.name)}" style="flex:2" oninput="ingRows[${i}].name=this.value" />
      <input type="text" placeholder="Qty" value="${esc(ing.qty)}" style="width:70px" oninput="ingRows[${i}].qty=this.value" />
      <select onchange="ingRows[${i}].cat=this.value" style="flex:1">
        ${CATS.map(c=>`<option value="${c}" ${ing.cat===c?'selected':''}>${c}</option>`).join('')}
      </select>
      <span style="color:var(--muted);cursor:pointer;padding:4px" onclick="ingRows.splice(${i},1);renderIngRows()">✕</span>`;
    el.appendChild(row);
  });
}

window.saveMeal=async function(){
  const name=document.getElementById('new-meal-name').value.trim();
  const emoji=document.getElementById('new-meal-emoji').value.trim()||'🍽️';
  if(!name){ showToast('Enter a meal name'); return; }
  const ingredients=ingRows.filter(r=>r.name.trim());
  await addDoc(collection(db,'families',FC,'mealLibrary'),{name,emoji,ingredients,createdAt:serverTimestamp()});
  closeAddMealModal(); showToast('Meal added!');
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0f0f" />
  <title>Groceries · Upton ∞ +1</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;--text:#e8e8e8;--muted:#888;--accent:#4f8ef7;--green:#3ecf6a;--red:#f75a5a;--radius:14px; }
    body { background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100dvh;display:flex;flex-direction:column; }
    nav { background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100; }
    .back { font-size:.8rem;color:var(--accent);text-decoration:none;border:1px solid var(--border);border-radius:8px;padding:4px 10px; }
    .nav-title { flex:1;font-size:1.1rem;font-weight:700;color:var(--text); }
    .tabs { display:flex;background:var(--surface);border-bottom:1px solid var(--border); }
    .tab { flex:1;text-align:center;padding:12px 4px;font-size:.82rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s; }
    .tab.active { color:var(--accent);border-bottom-color:var(--accent); }
    main { flex:1;overflow-y:auto;padding:16px;max-width:640px;width:100%;margin:0 auto; }
    .page { display:none; } .page.active { display:block; }

    .category-grid { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px; }
    .cat-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 14px;cursor:pointer;transition:all .15s;text-align:center; }
    .cat-card:active { transform:scale(.97); }
    .cat-card:hover { border-color:#3a3a3a; }
    .cat-card .cat-emoji { font-size:2.2rem;margin-bottom:8px;display:block; }
    .cat-card .cat-name { font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:2px; }
    .cat-card .cat-count { font-size:.7rem;color:var(--muted); }
    .cat-card.has-items { border-color:#1d4a2e; }

    .items-panel { display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden; }
    .items-panel.open { display:block; }
    .panel-header { padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between; }
    .panel-header h3 { font-size:.95rem;font-weight:700; }
    .panel-close { color:var(--muted);cursor:pointer;font-size:1.1rem;padding:4px; }
    .item-search { padding:10px 16px;border-bottom:1px solid var(--border); }
    .item-search input { width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:8px 12px;font-size:.88rem;outline:none; }
    .item-search input:focus { border-color:var(--accent); }
    .items-list { max-height:300px;overflow-y:auto; }
    .item-row { display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);gap:10px;cursor:pointer;transition:background .1s; }
    .item-row:last-child { border-bottom:none; }
    .item-row:hover { background:var(--surface2); }
    .item-row .item-name-text { flex:1;font-size:.9rem; }
    .item-row .add-btn { width:28px;height:28px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
    .item-row .add-btn.added { background:var(--green); }
    .custom-add-row { padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px; }
    .custom-add-row input { flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:8px 12px;font-size:.88rem;outline:none; }

    .list-item { display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border); }
    .list-item:last-child { border-bottom:none; }
    .cb { width:24px;height:24px;border-radius:7px;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s; }
    .cb.checked { background:var(--green);border-color:var(--green); }
    .cb.checked::after { content:'✓';color:#000;font-size:.82rem;font-weight:700; }
    .item-info { flex:1; }
    .item-info .iname { font-size:.9rem; }
    .item-info .iname.done { text-decoration:line-through;color:var(--muted); }
    .item-info .imeta { font-size:.72rem;color:var(--muted);margin-top:1px; }
    .qty-ctrl { display:flex;align-items:center;gap:6px; }
    .qty-btn { width:24px;height:24px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center; }
    .qty-num { font-size:.85rem;font-weight:600;min-width:18px;text-align:center; }
    .del-item { color:var(--muted);cursor:pointer;padding:4px 8px;font-size:.9rem;border-radius:6px; }
    .del-item:hover { color:var(--red);background:rgba(247,90,90,.1); }

    .section-head { font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px;display:flex;align-items:center;justify-content:space-between; }
    .card { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px; }

    .loc-section { margin-bottom:20px; }
    .loc-header { display:flex;align-items:center;gap:10px;margin-bottom:8px; }
    .loc-icon { width:44px;height:44px;border-radius:12px;object-fit:cover;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.6rem;overflow:hidden; }
    .loc-icon img { width:100%;height:100%;object-fit:cover;border-radius:12px; }
    .loc-name { font-size:.9rem;font-weight:700;flex:1; }
    .loc-count { font-size:.72rem;color:var(--muted); }
    .loc-edit-btn { font-size:.7rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px 8px;cursor:pointer;flex-shrink:0; }
    .loc-edit-btn:hover { color:var(--accent);border-color:var(--accent); }

    /* location image modal */
    .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s; }
    .modal-overlay.open { opacity:1;pointer-events:all; }
    .modal { background:var(--surface);border-radius:14px 14px 0 0;padding:24px 20px 36px;width:100%;max-width:640px;transform:translateY(40px);transition:transform .25s; }
    .modal-overlay.open .modal { transform:translateY(0); }
    .modal h3 { font-size:1rem;margin-bottom:14px; }
    .loc-preview { width:100%;height:140px;border-radius:12px;object-fit:cover;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:3rem;margin-bottom:12px;overflow:hidden; }
    .loc-preview img { width:100%;height:100%;object-fit:cover;border-radius:12px; }

    .btn { display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius);font-size:.88rem;font-weight:600;cursor:pointer;border:none;transition:all .15s; }
    .btn-primary { background:var(--accent);color:#fff; }
    .btn-ghost { background:var(--surface2);color:var(--text);border:1px solid var(--border); }
    .btn-sm { padding:6px 12px;font-size:.78rem; }
    .btn-danger-sm { background:rgba(247,90,90,.15);color:var(--red);border:none;border-radius:8px;padding:6px 12px;font-size:.78rem;cursor:pointer; }

    .empty { text-align:center;color:var(--muted);padding:40px 16px;font-size:.88rem;line-height:1.6; }
    .toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:30px;font-size:.85rem;font-weight:500;z-index:300;transition:transform .3s;white-space:nowrap; }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .pill { font-size:.68rem;background:var(--green);color:#000;border-radius:10px;padding:1px 7px;font-weight:700; }
    .input-row { display:flex;gap:8px;margin-bottom:12px; }
    input[type=text] { background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:10px 14px;font-size:.9rem;font-family:inherit;outline:none;flex:1; }
    input[type=text]:focus { border-color:var(--accent); }
  </style>
</head>
<body>
<script>(function(){try{var s=JSON.parse(localStorage.getItem('hm_session'));if(!s||!s.user||Date.now()>s.exp){location.href='index.html';}}catch(e){location.href='index.html';}})();</script>
<nav>
  <a class="back" href="index.html">← Home</a>
  <span class="nav-title">🛒 Groceries</span>
  <button class="btn btn-ghost btn-sm" id="clear-checked-btn" onclick="clearChecked()" style="display:none">Clear done</button>
</nav>
<div class="tabs">
  <div class="tab active" onclick="switchTab('shop')" id="tab-shop">Shop</div>
  <div class="tab" onclick="switchTab('list')" id="tab-list">List <span id="list-pill" style="display:none" class="pill">0</span></div>
  <div class="tab" onclick="switchTab('location')" id="tab-location">By Location</div>
</div>
<main>
  <!-- SHOP -->
  <div class="page active" id="page-shop">
    <div id="items-panel" class="items-panel">
      <div class="panel-header">
        <h3 id="panel-title">Items</h3>
        <span class="panel-close" onclick="closePanel()">✕</span>
      </div>
      <div class="item-search"><input type="text" id="panel-search" placeholder="Search items…" oninput="filterPanel()" /></div>
      <div class="items-list" id="panel-items"></div>
      <div class="custom-add-row">
        <input type="text" id="custom-item-input" placeholder="Add custom item…" onkeydown="if(event.key==='Enter') addCustomItem()" />
        <button class="btn btn-primary btn-sm" onclick="addCustomItem()">Add</button>
      </div>
    </div>
    <div class="category-grid" id="cat-grid"></div>
  </div>

  <!-- LIST -->
  <div class="page" id="page-list">
    <div id="list-content"><div style="text-align:center;color:var(--muted);padding:40px">Loading…</div></div>
  </div>

  <!-- LOCATION -->
  <div class="page" id="page-location">
    <div id="loc-content"></div>
  </div>
</main>
<div class="toast" id="toast"></div>

<!-- LOCATION IMAGE MODAL -->
<div class="modal-overlay" id="loc-modal">
  <div class="modal">
    <h3 id="loc-modal-title">Customize Location</h3>
    <div class="loc-preview" id="loc-preview-box"><span id="loc-preview-emoji"></span></div>
    <div style="margin-bottom:10px">
      <label style="font-size:.78rem;color:var(--muted);display:block;margin-bottom:5px">Upload a photo</label>
      <input type="file" id="loc-img-file" accept="image/*" style="font-size:.82rem;color:var(--muted);width:100%" onchange="previewLocImage(this)" />
    </div>
    <div style="margin-bottom:14px">
      <label style="font-size:.78rem;color:var(--muted);display:block;margin-bottom:5px">Or paste an image URL</label>
      <input type="text" id="loc-img-url" placeholder="https://…" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:9px 13px;font-size:.85rem;outline:none" oninput="previewLocUrl(this.value)" />
    </div>
    <button class="btn btn-primary" style="width:100%;margin-bottom:8px" onclick="saveLocImage()">Save</button>
    <button class="btn btn-ghost" style="width:100%" onclick="closeLocModal()">Cancel</button>
    <button class="btn" style="width:100%;margin-top:6px;color:var(--muted);background:transparent;font-size:.78rem" onclick="clearLocImage()">Remove custom image</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,doc,addDoc,updateDoc,deleteDoc,onSnapshot,query,orderBy,serverTimestamp,setDoc,getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = { apiKey:"AIzaSyDQhwcgkxst89m4aY2hxLXwaGwP4dDJWaY",authDomain:"list-app-c9d29.firebaseapp.com",projectId:"list-app-c9d29",storageBucket:"list-app-c9d29.firebasestorage.app",messagingSenderId:"31606662627",appId:"1:31606662627:web:0503723562bde9b3962cd6" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const FC = (()=>{try{return JSON.parse(localStorage.getItem('hm_session')).familyCode||'default';}catch(e){return 'default';}})();

const CATS = {
  vegetables: { emoji:'🥦', label:'Vegetables', loc:'fridge', items:['Onion','Garlic','Potatoes','Carrots','Celery','Broccoli','Spinach','Lettuce','Tomatoes','Bell Peppers','Mushrooms','Corn','Peas','Green Beans','Cucumber','Zucchini','Sweet Potato','Asparagus','Cauliflower','Kale','Cabbage','Brussels Sprouts'] },
  fruits:     { emoji:'🍎', label:'Fruits',     loc:'counter', items:['Apples','Bananas','Oranges','Grapes','Strawberries','Lemons','Limes','Blueberries','Watermelon','Pineapple','Peaches','Pears','Mango','Avocado','Raspberries','Cherries','Cantaloupe'] },
  meats:      { emoji:'🥩', label:'Meats & Seafood', loc:'fridge', items:['Chicken Breast','Ground Beef','Pork Chops','Bacon','Steak','Salmon','Shrimp','Turkey','Ham','Sausage','Lamb','Tuna','Chicken Thighs','Cod','Tilapia','Hot Dogs','Deli Turkey','Deli Ham'] },
  dairy:      { emoji:'🧀', label:'Dairy & Eggs', loc:'fridge', items:['Milk','Butter','Cheddar Cheese','Parmesan','Cream Cheese','Sour Cream','Yogurt','Heavy Cream','Eggs','Mozzarella','Cottage Cheese','Half & Half','Swiss Cheese','Whipped Cream','American Cheese','Provolone'] },
  drinks:     { emoji:'🥤', label:'Drinks',     loc:'fridge', items:['Orange Juice','Apple Juice','Coffee','Tea','Soda','Water (Bottled)','Beer','Wine','Sports Drinks','Sparkling Water','Lemonade','Coconut Water','Iced Tea','Energy Drinks','Creamer'] },
  bread:      { emoji:'🍞', label:'Bread & Bakery', loc:'counter', items:['Sandwich Bread','Bagels','English Muffins','Flour Tortillas','Corn Tortillas','Pita Bread','Dinner Rolls','Baguette','Sourdough','Hot Dog Buns','Burger Buns','Crackers','Waffles','Pancake Mix'] },
  pantry:     { emoji:'🥫', label:'Pantry & Canned', loc:'pantry', items:['Pasta','Rice','Canned Tomatoes','Chicken Broth','Black Beans','Kidney Beans','Olive Oil','Vegetable Oil','Soy Sauce','Ketchup','Mustard','Mayonnaise','Honey','Maple Syrup','Peanut Butter','Jelly','Cereal','Oatmeal','Flour','Sugar','Brown Sugar','Baking Powder','Baking Soda','Vanilla Extract','Panko Breadcrumbs','Tomato Paste','Coconut Milk','Salsa','Hot Sauce'] },
  frozen:     { emoji:'🧊', label:'Frozen',     loc:'freezer', items:['Frozen Pizza','Ice Cream','Frozen Vegetables','Frozen Fruit','Waffles','French Fries','Chicken Nuggets','Fish Sticks','Frozen Meals','Edamame','Frozen Shrimp','Ice'] },
  spices:     { emoji:'🧂', label:'Spices',     loc:'spicerack', items:['Salt','Black Pepper','Garlic Powder','Onion Powder','Paprika','Cumin','Oregano','Basil','Thyme','Chili Powder','Cinnamon','Nutmeg','Bay Leaves','Cayenne','Turmeric','Rosemary','Sage','Dill','Parsley','Red Pepper Flakes','Italian Seasoning','Lemon Pepper','Everything Bagel Seasoning'] },
  household:  { emoji:'🧹', label:'Household',  loc:'supplies', items:['Paper Towels','Toilet Paper','Dish Soap','Laundry Detergent','Hand Soap','Trash Bags','Sponges','Cleaning Spray','Fabric Softener','Dryer Sheets','Aluminum Foil','Plastic Wrap','Zip Bags','Dishwasher Pods','Bleach','Air Freshener','Batteries','Toothpaste','Shampoo','Conditioner','Body Wash','Deodorant','Razors','Cotton Balls'] },
  other:      { emoji:'📦', label:'Other',      loc:'cabinet', items:[] }
};

const LOCATIONS = {
  fridge:    { emoji:'🧊', label:'Fridge' },
  freezer:   { emoji:'❄️', label:'Freezer' },
  pantry:    { emoji:'🗄️', label:'Pantry' },
  cabinet:   { emoji:'🗃️', label:'Cabinet' },
  spicerack: { emoji:'🧂', label:'Spice Rack' },
  counter:   { emoji:'🍳', label:'Counter' },
  supplies:  { emoji:'🧹', label:'Supplies' }
};

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg,dur=2000){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),dur); }

let shoppingList = [];
let currentCat = null;
let locationImages = {}; // locKey -> imageDataUrl or URL
let editingLocKey = null;
let pendingImageData = null;

onSnapshot(collection(db,'families',FC,'locationSettings'), snap => {
  locationImages = {};
  snap.docs.forEach(d=>{ locationImages[d.id] = d.data().imageUrl||null; });
  renderLocation();
});

onSnapshot(query(collection(db,'families',FC,'shoppingList'),orderBy('addedAt','asc')), snap => {
  shoppingList = snap.docs.map(d=>({id:d.id,...d.data()}));
  updatePill();
  renderList();
  renderLocation();
  renderCatGrid();
});

function updatePill(){
  const unchecked = shoppingList.filter(i=>!i.checked).length;
  const pill = document.getElementById('list-pill');
  pill.textContent = unchecked;
  pill.style.display = unchecked > 0 ? 'inline-block' : 'none';
  document.getElementById('clear-checked-btn').style.display = shoppingList.some(i=>i.checked)?'inline-flex':'none';
}

let currentTab = 'shop';
window.switchTab = function(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
};

// ── SHOP TAB ──────────────────────────────────────────────────────────────────
function renderCatGrid(){
  const el = document.getElementById('cat-grid');
  el.innerHTML='';
  Object.entries(CATS).forEach(([key,cat])=>{
    const count = shoppingList.filter(i=>i.category===key&&!i.checked).length;
    const div = document.createElement('div');
    div.className='cat-card'+(count>0?' has-items':'');
    div.innerHTML=`<span class="cat-emoji">${cat.emoji}</span><div class="cat-name">${cat.label}</div><div class="cat-count">${count>0?count+' in list':'Tap to add'}</div>`;
    div.onclick=()=>openPanel(key);
    el.appendChild(div);
  });
}
renderCatGrid();

function openPanel(catKey){
  currentCat = catKey;
  const cat = CATS[catKey];
  document.getElementById('panel-title').textContent = cat.emoji+' '+cat.label;
  document.getElementById('panel-search').value='';
  document.getElementById('custom-item-input').value='';
  filterPanel();
  document.getElementById('items-panel').classList.add('open');
  document.getElementById('panel-search').focus();
}
window.closePanel=()=>{ document.getElementById('items-panel').classList.remove('open'); currentCat=null; };

window.filterPanel=function(){
  const q = document.getElementById('panel-search').value.toLowerCase();
  const cat = CATS[currentCat];
  const el = document.getElementById('panel-items');
  const items = cat.items.filter(i=>i.toLowerCase().includes(q));
  el.innerHTML='';
  if(items.length===0&&q){ const r=document.createElement('div'); r.style.cssText='padding:12px 16px;color:var(--muted);font-size:.85rem'; r.textContent='No matches — add it below'; el.appendChild(r); return; }
  items.forEach(name=>{
    const onList = shoppingList.find(i=>i.name.toLowerCase()===name.toLowerCase()&&i.category===currentCat);
    const row=document.createElement('div'); row.className='item-row';
    row.innerHTML=`<span class="item-name-text">${esc(name)}</span><button class="add-btn${onList?' added':''}" onclick="toggleItem('${esc(name)}','${currentCat}')">${onList?'✓':'+'}</button>`;
    el.appendChild(row);
  });
};

window.toggleItem=async function(name,catKey){
  const existing = shoppingList.find(i=>i.name.toLowerCase()===name.toLowerCase()&&i.category===catKey&&!i.checked);
  if(existing){ await deleteDoc(doc(db,'families',FC,'shoppingList',existing.id)); showToast('Removed'); }
  else { await addDoc(collection(db,'families',FC,'shoppingList'),{name,category:catKey,qty:1,checked:false,addedAt:serverTimestamp(),source:'manual',location:CATS[catKey].loc}); showToast('Added!'); }
  filterPanel();
};

window.addCustomItem=async function(){
  const inp=document.getElementById('custom-item-input'); const name=inp.value.trim();
  if(!name||!currentCat) return; inp.value='';
  await addDoc(collection(db,'families',FC,'shoppingList'),{name,category:currentCat,qty:1,checked:false,addedAt:serverTimestamp(),source:'custom',location:CATS[currentCat].loc});
  showToast('Added!'); filterPanel();
};

// ── LIST TAB ──────────────────────────────────────────────────────────────────
function renderList(){
  const el=document.getElementById('list-content');
  if(shoppingList.length===0){ el.innerHTML='<div class="empty">Nothing on your list.<br>Go to <strong>Shop</strong> to add items.</div>'; return; }
  const groups={};
  shoppingList.forEach(item=>{ if(!groups[item.category]) groups[item.category]=[]; groups[item.category].push(item); });
  el.innerHTML='';
  Object.entries(groups).forEach(([catKey,items])=>{
    const cat=CATS[catKey]||{emoji:'📦',label:catKey};
    const head=document.createElement('div'); head.className='section-head';
    head.innerHTML=`<span>${cat.emoji} ${cat.label}</span>`;
    el.appendChild(head);
    const card=document.createElement('div'); card.className='card';
    items.forEach(item=>{
      const row=document.createElement('div'); row.className='list-item';
      row.innerHTML=`
        <div class="cb ${item.checked?'checked':''}" onclick="toggleCheck('${item.id}',${item.checked})"></div>
        <div class="item-info">
          <div class="iname ${item.checked?'done':''}">${esc(item.name)}</div>
          ${item.source==='meal'?'<div class="imeta">From meal plan</div>':''}
        </div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty('${item.id}',${item.qty},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty('${item.id}',${item.qty},1)">+</button>
        </div>
        <span class="del-item" onclick="deleteItem('${item.id}')">✕</span>`;
      card.appendChild(row);
    });
    el.appendChild(card);
  });
}

window.toggleCheck=async function(id,checked){ await updateDoc(doc(db,'families',FC,'shoppingList',id),{checked:!checked}); };
window.changeQty=async function(id,qty,delta){ const n=Math.max(1,qty+delta); await updateDoc(doc(db,'families',FC,'shoppingList',id),{qty:n}); };
window.deleteItem=async function(id){ await deleteDoc(doc(db,'families',FC,'shoppingList',id)); };
window.clearChecked=async function(){ const done=shoppingList.filter(i=>i.checked); await Promise.all(done.map(i=>deleteDoc(doc(db,'families',FC,'shoppingList',i.id)))); showToast('Cleared!'); };

// ── LOCATION TAB ─────────────────────────────────────────────────────────────
function locIconHtml(locKey, loc){
  const img = locationImages[locKey];
  if(img) return `<div class="loc-icon"><img src="${esc(img)}" alt="${esc(loc.label)}" /></div>`;
  return `<div class="loc-icon">${loc.emoji}</div>`;
}

function renderLocation(){
  const el=document.getElementById('loc-content');
  const unchecked=shoppingList.filter(i=>!i.checked);
  if(unchecked.length===0){
    el.innerHTML=`<div class="empty">No items on your list yet.<br><br>Add items in the <strong>Shop</strong> tab — each item is auto-assigned to a storage location.<br><br>Tap <strong>📷 Edit</strong> on any location to add a photo of your actual fridge, pantry, etc.</div>`;
    // Still render all locations so user can add photos even when list is empty
    const allLocs = document.createElement('div');
    Object.entries(LOCATIONS).forEach(([locKey,loc])=>{
      const section=document.createElement('div'); section.className='loc-section';
      section.innerHTML=`<div class="loc-header">${locIconHtml(locKey,loc)}<span class="loc-name">${loc.label}</span><button class="loc-edit-btn" onclick="openLocModal('${locKey}')">📷 Edit</button></div>`;
      allLocs.appendChild(section);
    });
    el.appendChild(allLocs);
    return;
  }
  const groups={};
  unchecked.forEach(item=>{ const loc=item.location||'cabinet'; if(!groups[loc]) groups[loc]=[]; groups[loc].push(item); });
  el.innerHTML='';
  Object.entries(groups).forEach(([locKey,items])=>{
    const loc=LOCATIONS[locKey]||{emoji:'📦',label:locKey};
    const section=document.createElement('div'); section.className='loc-section';
    const header=document.createElement('div'); header.className='loc-header';
    header.innerHTML=`${locIconHtml(locKey,loc)}<span class="loc-name">${loc.label}</span><span class="loc-count">${items.length} item${items.length>1?'s':''}</span><button class="loc-edit-btn" onclick="openLocModal('${locKey}')">📷 Edit</button>`;
    section.appendChild(header);
    const card=document.createElement('div'); card.className='card';
    items.forEach(item=>{
      const row=document.createElement('div'); row.className='list-item';
      row.innerHTML=`
        <div class="cb ${item.checked?'checked':''}" onclick="toggleCheck('${item.id}',${item.checked})"></div>
        <div class="item-info"><div class="iname ${item.checked?'done':''}">${esc(item.name)}</div></div>
        <span class="qty-num" style="color:var(--muted);margin-right:6px">${item.qty}</span>
        <select onchange="changeLocation('${item.id}',this.value)" style="font-size:.72rem;padding:3px 6px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);max-width:130px">
          ${Object.entries(LOCATIONS).map(([k,v])=>`<option value="${k}" ${(item.location||'cabinet')===k?'selected':''}>${v.emoji} ${v.label}</option>`).join('')}
        </select>`;
      card.appendChild(row);
    });
    section.appendChild(card); el.appendChild(section);
  });
}

window.changeLocation=async function(id,loc){ await updateDoc(doc(db,'families',FC,'shoppingList',id),{location:loc}); showToast('Location updated'); };

// ── LOCATION IMAGE MODAL ─────────────────────────────────────────────────────
window.openLocModal=function(locKey){
  editingLocKey=locKey; pendingImageData=null;
  const loc=LOCATIONS[locKey]||{emoji:'📦',label:locKey};
  document.getElementById('loc-modal-title').textContent='Customize: '+loc.label;
  const preview=document.getElementById('loc-preview-box');
  const existing=locationImages[locKey];
  if(existing){ preview.innerHTML=`<img src="${esc(existing)}" />`; }
  else { preview.innerHTML=`<span id="loc-preview-emoji">${loc.emoji}</span>`; }
  document.getElementById('loc-img-file').value='';
  document.getElementById('loc-img-url').value='';
  document.getElementById('loc-modal').classList.add('open');
};
window.closeLocModal=()=>{ document.getElementById('loc-modal').classList.remove('open'); editingLocKey=null; pendingImageData=null; };

window.previewLocImage=function(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    pendingImageData=e.target.result;
    document.getElementById('loc-img-url').value='';
    document.getElementById('loc-preview-box').innerHTML=`<img src="${pendingImageData}" />`;
  };
  reader.readAsDataURL(file);
};

window.previewLocUrl=function(url){
  pendingImageData=null;
  if(url) document.getElementById('loc-preview-box').innerHTML=`<img src="${esc(url)}" onerror="this.style.display='none'" />`;
};

window.saveLocImage=async function(){
  if(!editingLocKey) return;
  const urlInput=document.getElementById('loc-img-url').value.trim();
  const imageUrl=pendingImageData||(urlInput||null);
  if(!imageUrl){ showToast('No image selected'); return; }
  await setDoc(doc(db,'families',FC,'locationSettings',editingLocKey),{imageUrl});
  closeLocModal(); showToast('Location image saved!');
};

window.clearLocImage=async function(){
  if(!editingLocKey) return;
  await setDoc(doc(db,'families',FC,'locationSettings',editingLocKey),{imageUrl:null});
  closeLocModal(); showToast('Image removed');
};

// Expose for meal planning integration
window.addMealIngredients = async function(ingredients){
  for(const ing of ingredients){
    const exists = shoppingList.find(i=>i.name.toLowerCase()===ing.name.toLowerCase()&&!i.checked);
    if(!exists) await addDoc(collection(db,'families',FC,'shoppingList'),{name:ing.name,category:ing.cat||'pantry',qty:ing.qty||1,checked:false,addedAt:serverTimestamp(),source:'meal',location:CATS[ing.cat||'pantry']?.loc||'pantry'});
  }
  showToast('Ingredients added to list!');
};
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0f0f" />
  <title>Budget · Upton ∞ +1</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;--text:#e8e8e8;--muted:#888;--accent:#f7c94f;--green:#3ecf6a;--red:#f75a5a;--radius:14px; }
    body { background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100dvh;display:flex;flex-direction:column; }
    nav { background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100; }
    .back { font-size:.8rem;color:var(--accent);text-decoration:none;border:1px solid var(--border);border-radius:8px;padding:4px 10px; }
    .nav-title { flex:1;font-size:1.1rem;font-weight:700; }
    .month-nav { display:flex;align-items:center;gap:10px; }
    .month-btn { background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:4px 10px;cursor:pointer;font-size:.85rem; }
    .month-label { font-size:.82rem;color:var(--muted); }
    .tabs { display:flex;background:var(--surface);border-bottom:1px solid var(--border); }
    .tab { flex:1;text-align:center;padding:12px 4px;font-size:.82rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s; }
    .tab.active { color:var(--accent);border-bottom-color:var(--accent); }
    main { flex:1;overflow-y:auto;padding:16px;max-width:640px;width:100%;margin:0 auto; }
    .page { display:none; } .page.active { display:block; }

    .summary-grid { display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px; }
    .stat-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center; }
    .stat-label { font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px; }
    .stat-value { font-size:1.2rem;font-weight:700; }
    .stat-value.income { color:var(--green); }
    .stat-value.expense { color:var(--red); }
    .stat-value.balance.pos { color:var(--green); }
    .stat-value.balance.neg { color:var(--red); }

    .bar-wrap { background:var(--surface2);border-radius:6px;height:8px;overflow:hidden;margin-bottom:16px; }
    .bar-fill { height:100%;border-radius:6px;background:var(--green);transition:width .4s; }
    .bar-label { display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-bottom:4px; }

    .section-head { font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px;display:flex;align-items:center;justify-content:space-between; }
    .card { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px; }

    .tx-row { display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border); }
    .tx-row:last-child { border-bottom:none; }
    .tx-icon { width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0; }
    .tx-info { flex:1;min-width:0; }
    .tx-desc { font-size:.88rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .tx-cat { font-size:.7rem;color:var(--muted); }
    .tx-amount { font-size:.92rem;font-weight:700;flex-shrink:0; }
    .tx-amount.income { color:var(--green); }
    .tx-amount.expense { color:var(--red); }
    .del-tx { color:var(--muted);cursor:pointer;padding:4px 8px;font-size:.85rem;border-radius:6px;flex-shrink:0; }
    .del-tx:hover { color:var(--red);background:rgba(247,90,90,.1); }

    .cat-bar-row { display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border); }
    .cat-bar-row:last-child { border-bottom:none; }
    .cat-bar-label { width:100px;font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .cat-bar-wrap { flex:1;background:var(--surface2);border-radius:4px;height:6px;overflow:hidden; }
    .cat-bar-fill { height:100%;border-radius:4px;background:var(--red); }
    .cat-bar-amt { font-size:.8rem;color:var(--muted);min-width:60px;text-align:right; }

    .form-group { margin-bottom:14px; }
    .form-label { font-size:.78rem;color:var(--muted);margin-bottom:6px;display:block; }
    input[type=text],input[type=number],input[type=date],select { background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:10px 14px;font-size:.9rem;font-family:inherit;outline:none;transition:border-color .15s;width:100%;color-scheme:dark; }
    input:focus,select:focus { border-color:var(--accent); }
    .type-toggle { display:flex;gap:8px;margin-bottom:14px; }
    .type-opt { flex:1;padding:10px;text-align:center;border-radius:10px;border:2px solid var(--border);cursor:pointer;font-size:.85rem;font-weight:700;color:var(--muted);transition:all .15s; }
    .type-opt.income-opt.selected { border-color:var(--green);color:var(--green);background:rgba(62,207,106,.1); }
    .type-opt.expense-opt.selected { border-color:var(--red);color:var(--red);background:rgba(247,90,90,.1); }

    .btn { display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius);font-size:.88rem;font-weight:600;cursor:pointer;border:none;transition:all .15s; }
    .btn-primary { background:var(--accent);color:#000; }
    .btn-ghost { background:var(--surface2);color:var(--text);border:1px solid var(--border); }
    .btn-full { width:100%;margin-top:8px; }

    .empty { text-align:center;color:var(--muted);padding:40px 16px;font-size:.88rem;line-height:1.6; }
    .toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:30px;font-size:.85rem;font-weight:500;z-index:300;transition:transform .3s;white-space:nowrap; }
    .toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<script>(function(){try{var s=JSON.parse(localStorage.getItem('hm_session'));if(!s||!s.user||Date.now()>s.exp){location.href='index.html';}}catch(e){location.href='index.html';}})();</script>
<nav>
  <a class="back" href="index.html">← Home</a>
  <span class="nav-title">💰 Budget</span>
  <div class="month-nav">
    <button class="month-btn" onclick="changeMonth(-1)">←</button>
    <span class="month-label" id="month-label"></span>
    <button class="month-btn" onclick="changeMonth(1)">→</button>
  </div>
</nav>
<div class="tabs">
  <div class="tab active" onclick="switchTab('overview')" id="tab-overview">Overview</div>
  <div class="tab" onclick="switchTab('transactions')" id="tab-transactions">Transactions</div>
  <div class="tab" onclick="switchTab('add')" id="tab-add">+ Add</div>
</div>
<main>
  <div class="page active" id="page-overview"></div>
  <div class="page" id="page-transactions"></div>
  <div class="page" id="page-add">
    <div class="type-toggle">
      <div class="type-opt expense-opt selected" id="type-expense" onclick="setType('expense')">- Expense</div>
      <div class="type-opt income-opt" id="type-income" onclick="setType('income')">+ Income</div>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <input type="text" id="tx-desc" placeholder="Groceries, Paycheck, Netflix…" />
    </div>
    <div class="form-group">
      <label class="form-label">Amount ($)</label>
      <input type="number" id="tx-amount" placeholder="0.00" min="0" step="0.01" />
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select id="tx-cat"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Date</label>
      <input type="date" id="tx-date" />
    </div>
    <button class="btn btn-primary btn-full" onclick="saveTransaction()">Save</button>
  </div>
</main>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,doc,addDoc,deleteDoc,onSnapshot,query,orderBy,where,serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = { apiKey:"AIzaSyDQhwcgkxst89m4aY2hxLXwaGwP4dDJWaY",authDomain:"list-app-c9d29.firebaseapp.com",projectId:"list-app-c9d29",storageBucket:"list-app-c9d29.firebasestorage.app",messagingSenderId:"31606662627",appId:"1:31606662627:web:0503723562bde9b3962cd6" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const FC = (()=>{try{return JSON.parse(localStorage.getItem('hm_session')).familyCode||'default';}catch(e){return 'default';}})();

const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_S=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const EXPENSE_CATS=[{emoji:'🛒',label:'Groceries'},{emoji:'🏠',label:'Housing'},{emoji:'🚗',label:'Transport'},{emoji:'🍔',label:'Dining Out'},{emoji:'💊',label:'Health'},{emoji:'🎬',label:'Entertainment'},{emoji:'👕',label:'Clothing'},{emoji:'📱',label:'Subscriptions'},{emoji:'🏫',label:'Education'},{emoji:'🧹',label:'Household'},{emoji:'💳',label:'Other'}];
const INCOME_CATS=[{emoji:'💼',label:'Paycheck'},{emoji:'💹',label:'Investment'},{emoji:'🎁',label:'Gift'},{emoji:'💵',label:'Other Income'}];

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }
function fmt(n){ return '$'+Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); }

let transactions=[], monthOffset=0, selectedType='expense', currentTab='overview';

function getMonthRange(){
  const now=new Date(); now.setDate(1); now.setMonth(now.getMonth()+monthOffset);
  const year=now.getFullYear(), month=now.getMonth();
  const start=year+'-'+String(month+1).padStart(2,'0')+'-01';
  const lastDay=new Date(year,month+1,0).getDate();
  const end=year+'-'+String(month+1).padStart(2,'0')+'-'+String(lastDay).padStart(2,'0');
  return {start,end,label:MONTHS[month]+' '+year};
}

window.changeMonth=function(dir){ monthOffset+=dir; loadTransactions(); };

let unsubscribe=null;
function loadTransactions(){
  const {start,end,label}=getMonthRange();
  document.getElementById('month-label').textContent=MONTHS_S[new Date(start+'T00:00').getMonth()];
  if(unsubscribe) unsubscribe();
  unsubscribe=onSnapshot(query(collection(db,'families',FC,'budgetTransactions'),where('date','>=',start),where('date','<=',end),orderBy('date','desc')),snap=>{
    transactions=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderAll();
  });
}
loadTransactions();

window.switchTab=function(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='add') initForm();
  renderAll();
};

function renderAll(){
  if(currentTab==='overview') renderOverview();
  if(currentTab==='transactions') renderTransactions();
}

function renderOverview(){
  const el=document.getElementById('page-overview'); el.innerHTML='';
  const income=transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance=income-expense;
  const pct=income>0?Math.min(100,Math.round(expense/income*100)):expense>0?100:0;
  el.innerHTML=`
    <div class="summary-grid">
      <div class="stat-card"><div class="stat-label">Income</div><div class="stat-value income">${fmt(income)}</div></div>
      <div class="stat-card"><div class="stat-label">Expenses</div><div class="stat-value expense">${fmt(expense)}</div></div>
      <div class="stat-card"><div class="stat-label">Balance</div><div class="stat-value balance ${balance>=0?'pos':'neg'}">${balance>=0?'+':''}${fmt(balance)}</div></div>
    </div>
    <div class="bar-label"><span>Spending</span><span>${pct}% of income</span></div>
    <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${pct>90?'var(--red)':pct>70?'var(--accent)':'var(--green)'}"></div></div>`;

  const expenseTxs=transactions.filter(t=>t.type==='expense');
  if(expenseTxs.length>0){
    const catTotals={};
    expenseTxs.forEach(t=>{ catTotals[t.category]=(catTotals[t.category]||0)+t.amount; });
    const sorted=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
    const maxAmt=sorted[0]?.[1]||1;
    const head=document.createElement('div'); head.className='section-head'; head.textContent='By Category'; el.appendChild(head);
    const card=document.createElement('div'); card.className='card';
    sorted.forEach(([cat,amt])=>{
      const info=EXPENSE_CATS.find(c=>c.label===cat)||{emoji:'💳',label:cat};
      const row=document.createElement('div'); row.className='cat-bar-row';
      row.innerHTML=`<span class="cat-bar-label">${esc(info.emoji)} ${esc(cat)}</span><div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${Math.round(amt/maxAmt*100)}%"></div></div><span class="cat-bar-amt">${fmt(amt)}</span>`;
      card.appendChild(row);
    });
    el.appendChild(card);
  }

  const recentHead=document.createElement('div'); recentHead.className='section-head'; recentHead.textContent='Recent'; el.appendChild(recentHead);
  const recent=transactions.slice(0,5);
  if(recent.length===0){ const e=document.createElement('div'); e.className='empty'; e.textContent='No transactions this month.'; el.appendChild(e); }
  else{ const c=document.createElement('div'); c.className='card'; recent.forEach(t=>c.appendChild(txRow(t))); el.appendChild(c); }
}

function renderTransactions(){
  const el=document.getElementById('page-transactions');
  if(transactions.length===0){ el.innerHTML='<div class="empty">No transactions this month.</div>'; return; }
  el.innerHTML='';
  const card=document.createElement('div'); card.className='card';
  transactions.forEach(t=>card.appendChild(txRow(t)));
  el.appendChild(card);
}

function txRow(t){
  const cats=t.type==='income'?INCOME_CATS:EXPENSE_CATS;
  const cat=cats.find(c=>c.label===t.category)||{emoji:'💳'};
  const row=document.createElement('div'); row.className='tx-row';
  const iconBg=t.type==='income'?'rgba(62,207,106,.15)':'rgba(247,90,90,.1)';
  row.innerHTML=`
    <div class="tx-icon" style="background:${iconBg}">${cat.emoji}</div>
    <div class="tx-info">
      <div class="tx-desc">${esc(t.description)}</div>
      <div class="tx-cat">${esc(t.category)} · ${esc(t.date)}</div>
    </div>
    <div class="tx-amount ${t.type}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
    <span class="del-tx" onclick="deleteTx('${t.id}')">✕</span>`;
  return row;
}

window.deleteTx=async function(id){ if(!confirm('Delete this transaction?')) return; await deleteDoc(doc(db,'families',FC,'budgetTransactions',id)); showToast('Deleted'); };

function initForm(){
  const today=new Date(); document.getElementById('tx-date').value=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  updateCatSelect();
}

function updateCatSelect(){
  const sel=document.getElementById('tx-cat'); sel.innerHTML='';
  const cats=selectedType==='income'?INCOME_CATS:EXPENSE_CATS;
  cats.forEach(c=>{ const o=document.createElement('option'); o.value=c.label; o.textContent=c.emoji+' '+c.label; sel.appendChild(o); });
}

window.setType=function(type){
  selectedType=type;
  ['income','expense'].forEach(t=>{ document.getElementById('type-'+t).classList.toggle('selected',t===type); });
  updateCatSelect();
};

window.saveTransaction=async function(){
  const desc=document.getElementById('tx-desc').value.trim();
  const amount=parseFloat(document.getElementById('tx-amount').value);
  const cat=document.getElementById('tx-cat').value;
  const date=document.getElementById('tx-date').value;
  if(!desc){ showToast('Enter a description'); return; }
  if(!amount||amount<=0){ showToast('Enter a valid amount'); return; }
  if(!date){ showToast('Pick a date'); return; }
  await addDoc(collection(db,'families',FC,'budgetTransactions'),{description:desc,amount,category:cat,type:selectedType,date,createdAt:serverTimestamp()});
  document.getElementById('tx-desc').value=''; document.getElementById('tx-amount').value='';
  showToast('Saved!'); switchTab('overview');
};

initForm();
</script>
</body>
</html>
